<!DOCTYPE html>
<html>
<head>
    <title>Sudoku</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>Sudoku ({{ difficulty }})</h2>
<p><a href="/leaderboard">🏆 Leaderboard</a></p>

<div class="container">

<form method="POST" action="/solve">
    <table>
        {% for i in range(9) %}
        <tr>
            {% for j in range(9) %}
            <td>
                <input 
                    type="text"
                    inputmode="numeric"
                    pattern="[1-9]"
                    maxlength="1"
                    autocomplete="off"
                    name="cell-{{i}}-{{j}}"
                    data-row="{{i}}"
                    data-col="{{j}}"
                    data-initial="{{ 1 if board[i][j] != 0 else 0 }}"
                    value="{{ board[i][j] if board[i][j] != 0 else '' }}"
                    {% if board[i][j] != 0 %} readonly class="fixed" {% endif %}
                >
            </td>
            {% endfor %}
        </tr>
        {% endfor %}
    </table>

    <button type="submit">Solve</button>
</form>

<br>

<form method="POST">
    <select name="difficulty">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
    </select>
    <button type="submit">New Game</button>
</form>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
